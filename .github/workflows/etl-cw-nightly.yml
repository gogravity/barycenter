name: etl-cw-nightly
on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC nightly (D-03)
  workflow_dispatch:

permissions:
  id-token: write     # OIDC token (no client secrets)
  contents: read

jobs:
  sync:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: prod   # env-scoped OIDC subject claim per Pitfall 11
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_ETL_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: install
        run: |
          pip install -r scripts/ci/requirements.txt
          pip install -e 'packages/barycenter-audit'
          pip install -e 'packages/barycenter-etl'

      - name: run CW adapter
        env:
          KEY_VAULT_URL: ${{ vars.KEY_VAULT_URL }}
          SQL_CONNECTION_STRING: ${{ vars.SQL_CONNECTION_STRING }}
          CW_AUTH_MODE: ${{ vars.CW_AUTH_MODE }}
          DCE_LOGS_INGESTION_ENDPOINT: ${{ vars.DCE_LOGS_INGESTION_ENDPOINT }}
          DCR_IMMUTABLE_ID: ${{ vars.DCR_IMMUTABLE_ID }}
          WORM_APPEND_BLOB_URL: ${{ vars.WORM_APPEND_BLOB_URL }}
        run: |
          python -m barycenter.etl.run --adapter connectwise

      - name: post-sync chain integrity check
        run: |
          python scripts/ci/chain_validate.py --live || echo "chain validate not yet wired in this env"
