name: etl-cw-nightly
on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC nightly (D-03)
  workflow_dispatch:

permissions:
  id-token: write     # OIDC token (no client secrets)
  contents: read

jobs:
  sync:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: prod   # env-scoped OIDC subject claim per Pitfall 11
    steps:
      - uses: actions/checkout@v4

      # Authenticate as mi-bary-etl — has AcrPush on ACR + Contributor on CAJ.
      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_ETL_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # Build image in ACR (no local Docker required). Tags with commit SHA for
      # traceability; also overwrites :latest so the CAJ always pulls the current build.
      - name: build and push image
        env:
          ACR_NAME: ${{ vars.ACR_NAME }}
        run: |
          az acr build \
            --registry "$ACR_NAME" \
            --image "barycenter-etl:${{ github.sha }}" \
            --image "barycenter-etl:latest" \
            --file packages/barycenter-etl/Dockerfile \
            .

      # Update the CAJ to pin the commit-SHA image, then start a single execution.
      # The job runs inside the VNet so it can reach SQL, Key Vault, and WORM storage.
      - name: trigger ETL job
        env:
          ACR_NAME: ${{ vars.ACR_NAME }}
        run: |
          az containerapp job update \
            --name caj-bary-etl \
            --resource-group rg-barycenter-dev \
            --image "$ACR_NAME.azurecr.io/barycenter-etl:${{ github.sha }}"

          EXECUTION_NAME=$(az containerapp job start \
            --name caj-bary-etl \
            --resource-group rg-barycenter-dev \
            --query name -o tsv)
          echo "EXECUTION_NAME=$EXECUTION_NAME" >> "$GITHUB_ENV"

      # Poll every 30 s, timeout after 15 min. Mirrors the CAJ replicaTimeout of 900 s.
      - name: wait for job completion
        run: |
          echo "Polling execution: $EXECUTION_NAME"
          for i in $(seq 1 30); do
            STATUS=$(az containerapp job execution show \
              --name caj-bary-etl \
              --resource-group rg-barycenter-dev \
              --job-execution-name "$EXECUTION_NAME" \
              --query properties.status -o tsv 2>/dev/null || echo "Unknown")
            echo "  attempt $i: $STATUS"
            if [[ "$STATUS" == "Succeeded" ]]; then
              echo "ETL job succeeded"
              exit 0
            elif [[ "$STATUS" == "Failed" || "$STATUS" == "Stopped" ]]; then
              echo "ETL job failed with status: $STATUS"
              exit 1
            fi
            sleep 30
          done
          echo "ETL job timed out after 15 minutes"
          exit 1

      - name: post-sync chain integrity check
        # TODO(2026-Q2): remove continue-on-error once chain_validate.py --live
        # is wired to the production Log Analytics / WORM blob endpoints.
        # Tracking: WR-05 — a non-zero exit here means WORM chain is broken or
        # the validator is misconfigured; both must be treated as blocking.
        continue-on-error: true
        run: python scripts/ci/chain_validate.py --live
