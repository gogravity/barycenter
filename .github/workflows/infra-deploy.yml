name: infra-deploy
on:
  workflow_dispatch: {}
  pull_request:
    paths: [ 'infra/**', 'sql/**', '.github/workflows/infra-deploy.yml' ]
  push:
    branches: [ main ]
    paths: [ 'infra/**', 'sql/**', '.github/workflows/infra-deploy.yml' ]

permissions:
  id-token: write
  contents: read
  pull-requests: write   # to comment with what-if output
  actions: write         # gh variable set in deploy jobs step

env:
  RG_DEV: rg-barycenter-dev
  RG_IDENTITY: rg-barycenter-identity

jobs:
  what-if:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_WHATIF_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: az bicep build (lint all modules)
        run: |
          for f in infra/*/main.bicep; do
            echo "::group::bicep build $f"
            az bicep build --file "$f"
            echo "::endgroup::"
          done
      - name: what-if identity
        run: az deployment group what-if -g $RG_IDENTITY -f infra/identity/main.bicep -p infra/identity/main.dev.bicepparam
      - name: what-if networking
        env:
          FGT_ADMIN_SSH_PUBLIC_KEY: ${{ vars.FGT_ADMIN_SSH_PUBLIC_KEY }}
        run: az deployment group what-if -g $RG_DEV -f infra/networking/main.bicep -p infra/networking/main.dev.bicepparam
      - name: what-if data
        run: az deployment group what-if -g $RG_DEV -f infra/data/main.bicep -p infra/data/main.dev.bicepparam
      - name: what-if audit
        run: az deployment group what-if -g $RG_DEV -f infra/audit/main.bicep -p infra/audit/main.dev.bicepparam
      - name: what-if jobs
        env:
          DEPLOY_PRINCIPAL_ID: ${{ vars.DEPLOY_PRINCIPAL_ID }}
          ETL_IDENTITY_RESOURCE_ID: ${{ vars.ETL_IDENTITY_RESOURCE_ID }}
          ETL_PRINCIPAL_ID: placeholder
          JOBS_SUBNET_ID: placeholder
          KEY_VAULT_URL: ${{ vars.KEY_VAULT_URL }}
          SQL_CONNECTION_STRING: ${{ vars.SQL_CONNECTION_STRING }}
          DCE_LOGS_INGESTION_ENDPOINT: ${{ vars.DCE_LOGS_INGESTION_ENDPOINT }}
          DCR_IMMUTABLE_ID: ${{ vars.DCR_IMMUTABLE_ID }}
          WORM_APPEND_BLOB_URL: ${{ vars.WORM_APPEND_BLOB_URL }}
        run: az deployment group what-if -g $RG_DEV -f infra/jobs/main.bicep -p infra/jobs/main.dev.bicepparam

  deploy:
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_DEPLOY_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      # Order: identity → networking → data → audit (per dependency graph)
      - name: deploy identity
        id: identity
        run: |
          az deployment group create -g $RG_IDENTITY -f infra/identity/main.bicep -p infra/identity/main.dev.bicepparam --query properties.outputs -o json > /tmp/identity-outputs.json
          echo "ETL_PRINCIPAL_ID=$(jq -r .etlPrincipalId.value /tmp/identity-outputs.json)" >> $GITHUB_ENV
          echo "AZURE_ETL_CLIENT_ID=$(jq -r .etlClientId.value /tmp/identity-outputs.json)" >> $GITHUB_ENV
          echo "PLATFORM_PRINCIPAL_ID=$(jq -r .platformPrincipalId.value /tmp/identity-outputs.json)" >> $GITHUB_ENV
          echo "AUDIT_PRINCIPAL_ID=$(jq -r .auditPrincipalId.value /tmp/identity-outputs.json)" >> $GITHUB_ENV
          echo "AZURE_AUDIT_CLIENT_ID=$(jq -r .auditClientId.value /tmp/identity-outputs.json)" >> $GITHUB_ENV
          echo "AUDIT_IDENTITY_RESOURCE_ID=$(jq -r .auditIdentityId.value /tmp/identity-outputs.json)" >> $GITHUB_ENV
          echo "ADMIN_PRINCIPAL_ID=$(jq -r .adminPrincipalId.value /tmp/identity-outputs.json)" >> $GITHUB_ENV
      - name: deploy networking
        id: networking
        env:
          FGT_ADMIN_SSH_PUBLIC_KEY: ${{ vars.FGT_ADMIN_SSH_PUBLIC_KEY }}
        run: |
          az deployment group create -g $RG_DEV -f infra/networking/main.bicep -p infra/networking/main.dev.bicepparam --query properties.outputs -o json > /tmp/networking-outputs.json
          SPOKE_VNET_ID=$(jq -r .spokeVnetId.value /tmp/networking-outputs.json)
          echo "DATA_SUBNET_ID=${SPOKE_VNET_ID}/subnets/data-subnet" >> $GITHUB_ENV
          echo "PE_SUBNET_ID=${SPOKE_VNET_ID}/subnets/pe-subnet" >> $GITHUB_ENV
          # DEPLOY_SCRIPT_SUBNET_ID intentionally not exported here:
          # the SQL grants deployment script requires a storage account reachable
          # via private endpoint — not yet provisioned. Run migrations manually via:
          #   DEPLOY_SCRIPT_SUBNET_ID=<id> az deployment group create ...
          # TODO: wire blob PE for stbarydeploydev then re-enable auto-migration.
      - name: deploy data
        id: data
        env:
          DEPLOY_PRINCIPAL_ID: ${{ vars.DEPLOY_PRINCIPAL_ID }}
          SQL_ADMIN_GROUP_OBJECT_ID: ${{ vars.SQL_ADMIN_GROUP_OBJECT_ID }}
          DEPLOY_IDENTITY_RESOURCE_ID: ${{ vars.DEPLOY_IDENTITY_RESOURCE_ID }}
        run: |
          az deployment group create -g $RG_DEV -f infra/data/main.bicep -p infra/data/main.dev.bicepparam --query properties.outputs -o json > /tmp/data-outputs.json
          echo "SQL_SERVER_ID=$(jq -r .sqlServerId.value /tmp/data-outputs.json)" >> $GITHUB_ENV
          echo "SQL_DATABASE_ID=$(jq -r 'if .databaseId.value == null then "" else .databaseId.value end' /tmp/data-outputs.json)" >> $GITHUB_ENV
          echo "KEY_VAULT_ID=$(jq -r .keyVaultId.value /tmp/data-outputs.json)" >> $GITHUB_ENV
          echo "KEY_VAULT_NAME=$(jq -r .keyVaultId.value /tmp/data-outputs.json | awk -F/ '{print $NF}')" >> $GITHUB_ENV
      - name: deploy audit
        id: audit
        run: |
          az deployment group create -g $RG_DEV -f infra/audit/main.bicep -p infra/audit/main.dev.bicepparam --query properties.outputs -o json > /tmp/audit-outputs.json
          echo "DCE_LOGS_INGESTION_ENDPOINT=$(jq -r .dceLogsIngestionEndpoint.value /tmp/audit-outputs.json)" >> $GITHUB_ENV
          echo "DCR_IMMUTABLE_ID=$(jq -r .dcrImmutableId.value /tmp/audit-outputs.json)" >> $GITHUB_ENV
          echo "WORM_STORAGE_ACCOUNT=$(jq -r .wormStorageAccountId.value /tmp/audit-outputs.json | awk -F/ '{print $NF}')" >> $GITHUB_ENV
          echo "SQL_SERVER_FQDN=$(jq -r .sqlServerFqdn.value /tmp/data-outputs.json 2>/dev/null || echo 'sql-bary-dev.database.windows.net')" >> $GITHUB_ENV
      - name: deploy jobs
        id: jobs
        env:
          DEPLOY_PRINCIPAL_ID: ${{ vars.DEPLOY_PRINCIPAL_ID }}
          ETL_IDENTITY_RESOURCE_ID: ${{ vars.ETL_IDENTITY_RESOURCE_ID }}
        run: |
          # Construct jobs-subnet ID from spoke VNet output captured in networking step
          SPOKE_VNET_ID=$(jq -r .spokeVnetId.value /tmp/networking-outputs.json)
          echo "JOBS_SUBNET_ID=${SPOKE_VNET_ID}/subnets/jobs-subnet" >> $GITHUB_ENV
          export JOBS_SUBNET_ID="${SPOKE_VNET_ID}/subnets/jobs-subnet"
          export ETL_PRINCIPAL_ID="$ETL_PRINCIPAL_ID"
          export AZURE_ETL_CLIENT_ID="$AZURE_ETL_CLIENT_ID"
          # Audit identity vars (captured from identity stack outputs above)
          export AUDIT_PRINCIPAL_ID="$AUDIT_PRINCIPAL_ID"
          export AZURE_AUDIT_CLIENT_ID="$AZURE_AUDIT_CLIENT_ID"
          export AUDIT_IDENTITY_RESOURCE_ID="$AUDIT_IDENTITY_RESOURCE_ID"
          export KEY_VAULT_URL="$(jq -r .keyVaultUri.value /tmp/data-outputs.json)"
          export SQL_CONNECTION_STRING="${{ vars.SQL_CONNECTION_STRING }}"
          export DCE_LOGS_INGESTION_ENDPOINT="$DCE_LOGS_INGESTION_ENDPOINT"
          export DCR_IMMUTABLE_ID="$DCR_IMMUTABLE_ID"
          export WORM_APPEND_BLOB_URL="${{ vars.WORM_APPEND_BLOB_URL }}"
          az deployment group create \
            -g $RG_DEV \
            -f infra/jobs/main.bicep \
            -p infra/jobs/main.dev.bicepparam \
            --query properties.outputs -o json > /tmp/jobs-outputs.json
          echo "ACR_NAME=$(jq -r .acrName.value /tmp/jobs-outputs.json)" >> $GITHUB_ENV
          # ACR_NAME repo variable (acrbarydev) is set once manually or via bootstrap.
          # GITHUB_TOKEN cannot write repo variables; update manually if acrName changes.
      - name: emit deploy outputs to workflow summary
        run: |
          echo "### Deploy outputs" >> $GITHUB_STEP_SUMMARY
          echo "- DCE_LOGS_INGESTION_ENDPOINT, DCR_IMMUTABLE_ID, WORM_STORAGE_ACCOUNT exported" >> $GITHUB_STEP_SUMMARY
          echo "- ACR_NAME=$(jq -r .acrName.value /tmp/jobs-outputs.json)" >> $GITHUB_STEP_SUMMARY
          echo "- CAJ=$(jq -r .cajName.value /tmp/jobs-outputs.json)" >> $GITHUB_STEP_SUMMARY
