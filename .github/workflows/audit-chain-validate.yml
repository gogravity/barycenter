name: audit-chain-validate
on:
  pull_request:
    # No path filter — self-test is a required check on all PRs and runs in <1 min.
    # live-validate is gated to schedule/workflow_dispatch only (see job-level if:).
  schedule:
    - cron: '15 6 * * *'    # 06:15 UTC nightly (after infra-drift)
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  self-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: |
          pip install -r scripts/ci/requirements.txt
          pip install -e packages/barycenter-audit
      - name: AUDIT-01 self-test (clean fixture)
        run: python scripts/ci/chain_validate.py --self-test
      - name: AUDIT-01 self-test (tampered fixture - gate must fire)
        run: python scripts/ci/chain_validate.py --self-test --tampered

  live-validate:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_WHATIF_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: |
          pip install -r scripts/ci/requirements.txt
          pip install -e packages/barycenter-audit
      # Live-validate consumes DCE_LOGS_INGESTION_ENDPOINT, DCR_IMMUTABLE_ID, and
      # WORM_STORAGE_ACCOUNT exported by infra-deploy.yml's deploy job (captured from
      # the audit module's Bicep outputs into GITHUB_ENV after the main-branch deploy).
      # Nightly cron re-uses the most recent successful deploy's values via repo vars
      # (mirrored from GITHUB_ENV by a follow-up workflow that writes vars.LATEST_DCE_*).
      # For nightly schedule runs (no GITHUB_ENV from a fresh deploy), fall back to vars.
      - name: AUDIT-01 live validate
        env:
          WORM_STORAGE_ACCOUNT: ${{ vars.WORM_STORAGE_ACCOUNT || 'stbarywormdev' }}
          DCE_LOGS_INGESTION_ENDPOINT: ${{ vars.DCE_LOGS_INGESTION_ENDPOINT }}
          DCR_IMMUTABLE_ID: ${{ vars.DCR_IMMUTABLE_ID }}
        run: |
          if [ -z "$WORM_STORAGE_ACCOUNT" ]; then echo "::error::WORM_STORAGE_ACCOUNT not set; deploy job must populate vars.WORM_STORAGE_ACCOUNT"; exit 1; fi
          python scripts/ci/chain_validate.py
