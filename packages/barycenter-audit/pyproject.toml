[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "barycenter-audit"
version = "0.1.0"
requires-python = ">=3.12"
description = "Fail-closed audit SDK with SHA-256 chain integrity (D-04, D-05, D-06)"
dependencies = [
  "azure-identity>=1.19",
  "azure-monitor-ingestion>=1.0",
  "azure-keyvault-keys>=4.10",
  "azure-storage-blob>=12.24",
  "pyodbc>=5.2",
  "pydantic>=2.10",
]

[project.optional-dependencies]
dev = ["pytest>=8.3", "pytest-mock>=3.14"]

[tool.hatch.build.targets.wheel]
packages = ["src/barycenter"]
